name: mind_space
description: "MindSpace is a premium personal knowledge management system."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.7.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  intl: ^0.20.1
  shared_preferences: ^2.3.5
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  country_picker: ^2.0.28

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/brand/mindspace_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/brand/mindspace_logo.png
